name: CI

# Compuerta de calidad antes de promover a QA y a producción (main).
on:
  push:
    branches: [dev, qa, main]
  pull_request:
    branches: [dev, qa, main]

jobs:
  api-tests:
    name: API · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pruebas
        run: pytest -q

  web-build:
    name: Web · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

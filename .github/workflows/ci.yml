name: CI

# Compuerta de calidad antes de promover a QA y a producción (main).
on:
  push:
    branches: [dev, qa, main]
  pull_request:
    branches: [dev, qa, main]

jobs:
  api-lint:
    name: API · ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar ruff
        run: pip install ruff==0.8.4
      - name: Lint
        run: ruff check app/ tests/

  api-tests:
    name: API · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pruebas
        run: pytest -q

  api-audit:
    name: API · pip-audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true   # informativo por ahora; no bloquea el merge
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar pip-audit
        run: pip install pip-audit
      - name: Auditar dependencias
        run: pip-audit -r requirements.txt || true

  web-build:
    name: Web · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  report-build-e2e:
    name: Report · build + E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/report
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium
      - name: Pruebas E2E (gate de contraseña, navegador real)
        run: npx playwright test

# Fly.io config for the Private AI API.
# Deploy:
#   cd apps/api
#   fly launch --no-deploy        # creates the app (keep this fly.toml)
#   fly postgres create           # managed Postgres, then `fly postgres attach`
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32) \
#                   CORS_ORIGINS=https://tu-app.vercel.app
#   fly deploy
app = "private-ai-api"
primary_region = "qro"   # Querétaro (MX). Change as needed.

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8000"
  VECTOR_STORE = "inprocess"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [[http_service.checks.http]]
      path = "/health"
      interval = "30s"
      timeout = "5s"
      grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

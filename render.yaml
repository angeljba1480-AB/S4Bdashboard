# Render Blueprint — deploy the Private AI API + managed Postgres in one click.
# Render dashboard -> New -> Blueprint -> point at this repo.
# After deploy: set CORS_ORIGINS to your Vercel URL and (optionally) provider keys.
services:
  - type: web
    name: private-ai-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true            # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: private-ai-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false                     # set to https://tu-app.vercel.app
      # Vector store: "pgvector" reuses Postgres (run infra/supabase/001_pgvector.sql)
      - key: VECTOR_STORE
        value: inprocess
      # ---- Model providers (enable when ready) ----
      - key: OPEN_ENABLED
        value: "false"
      - key: OPEN_BASE_URL
        value: https://api.nanbuilders.com/v1
      - key: OPEN_API_KEY
        sync: false
      # ---- Workflows: managed n8n (optional) ----
      - key: N8N_ENABLED
        value: "false"
      - key: N8N_WEBHOOK_BASE_URL
        sync: false
      - key: N8N_API_KEY
        sync: false
      - key: N8N_API_BASE_URL
        sync: false

databases:
  - name: private-ai-db
    plan: free
    databaseName: privateai
    user: privateai
